<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="author" content="Tej">
  <meta name="keywords" content="portfolio, contact, web developer, HTML5">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <meta name="description" content="Contact Tej through accessible contact form.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="navbar" role="banner">
    <h1>Contact</h1>
    <nav aria-label="Main Navigation">
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
    <button id="theme-toggle">🌙 Toggle Theme</button>
  </header>

  <main class="container portfolio-layout" aria-label="Contact Content">
    <section class="hero">
      <h2>Contact Form</h2>

      <form class="contact-form" aria-label="Contact Form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>

        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Tej Portfolio</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
